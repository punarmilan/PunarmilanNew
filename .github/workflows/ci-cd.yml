name: Punarmilan CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  backend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        working-directory: ./backend
        run: mvn -B package --file pom.xml -DskipTests

      - name: Build Backend Docker Image
        run: docker build -t worknai009/punarmilan-backend:latest ./backend

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: worknai009
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Backend Docker Image
        run: docker push worknai009/punarmilan-backend:latest

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './punarmilan-frontend/package-lock.json'

      - name: Install dependencies
        working-directory: ./punarmilan-frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./punarmilan-frontend
        env:
          VITE_API_URL: https://punarmilan.com/api
          VITE_WS_URL: https://punarmilan.com/ws
        run: npm run build

      - name: Build Frontend Docker Image
        run: |
          docker build \
            --build-arg VITE_API_URL=/api \
            --build-arg VITE_WS_URL=/ws \
            -t worknai009/punarmilan-frontend:latest ./punarmilan-frontend

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: worknai009
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Frontend Docker Image
        run: docker push worknai009/punarmilan-frontend:latest

  truth-life-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './my-react-app/package-lock.json'

      - name: Install dependencies
        working-directory: ./my-react-app
        run: npm ci

      - name: Build Truth Life
        working-directory: ./my-react-app
        run: npm run build

      - name: Build Truth Life Docker Image
        run: docker build -t worknai009/punarmilan-truth-life:latest ./my-react-app

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: worknai009
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Truth Life Docker Image
        run: docker push worknai009/punarmilan-truth-life:latest

  login-server-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        working-directory: ./LoginRegisterServer
        run: mvn -B package --file pom.xml -DskipTests

      - name: Build Login Server Docker Image
        run: docker build -t worknai009/punarmilan-login-server:latest ./LoginRegisterServer

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: worknai009
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Login Server Docker Image
        run: docker push worknai009/punarmilan-login-server:latest

  # Deployment Job Placeholder
