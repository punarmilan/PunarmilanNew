events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Allow file uploads up to 15MB
    client_max_body_size 15m;

    # SSL Settings
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Upstream for Frontend
    upstream frontend_server {
        server frontend:80;
    }

    # Upstream for Backend
    upstream backend_server {
        server backend:8080;
    }

    # Upstream for MinIO
    upstream minio_server {
        server minio:9000;
    }

    # Redirect HTTP to HTTPS
    server {
        listen 80;
        server_name punarmilan.com www.punarmilan.com admin.punarmilan.com;
        return 301 https://$host$request_uri;
    }

    # Main HTTPS Server
    server {
        listen 443 ssl;
        server_name punarmilan.com www.punarmilan.com;

        # SSL Certificate Paths (Let's Encrypt standard)
        ssl_certificate     /etc/letsencrypt/live/punarmilan.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/punarmilan.com/privkey.pem;

        # Security Headers
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-XSS-Protection "1; mode=block";
        add_header X-Content-Type-Options "nosniff";
        add_header Referrer-Policy "strict-origin-when-cross-origin";

        # Route to MinIO Photos (prefix location preserves URL encoding for filenames with spaces)
        location /api/photos/ {
            proxy_pass http://minio_server/punarmilan-photos/;
            proxy_set_header Host minio:9000;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Security: Hide MinIO headers
            proxy_hide_header X-Amz-Id-2;
            proxy_hide_header X-Amz-Request-Id;
        }

        # Route to Frontend
        location / {
            proxy_pass http://frontend_server;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Route to Backend API
        location /api/ {
            proxy_pass http://backend_server;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Increase timeout for long requests
            proxy_read_timeout 300;
            proxy_connect_timeout 300;
            proxy_send_timeout 300;
        }

        # Route to WebSockets (Chat)
        location /ws/ {
            proxy_pass http://backend_server;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Essential for WebSocket stability
            proxy_read_timeout 86400;
        }
    }

    # Admin HTTPS Server
    server {
        listen 443 ssl;
        server_name admin.punarmilan.com;

        # SSL Certificate Paths
        ssl_certificate     /etc/letsencrypt/live/punarmilan.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/punarmilan.com/privkey.pem;

        # Redirect root / to /admin/
        location = / {
            return 301 https://admin.punarmilan.com/admin/;
        }

        # Handle all other paths
        location / {
            proxy_pass http://frontend_server;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
