version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: punarmilan-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: punarmilan_db
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
    volumes:
      - mysql_data:/var/lib/mysql
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$${DB_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: punarmilan-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: punarmilan-rabbitmq
    command: >
      sh -c "rabbitmq-plugins enable --offline rabbitmq_stomp && rabbitmq-server"
    ports:
      - "5672:5672"
      - "15672:15672"
      - "61613:61613" # STOMP
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    container_name: punarmilan-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: worknai009/punarmilan-backend:latest
    container_name: punarmilan-backend
    env_file: .env
    ports:
      - "8080:8080"
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_MASTER_URL: jdbc:mysql://mysql:3306/punarmilan_db
      SPRING_DATASOURCE_REPLICA_URL: jdbc:mysql://mysql:3306/punarmilan_db
      SPRING_DATA_REDIS_HOST: redis
      SPRING_RABBITMQ_HOST: rabbitmq
      MINIO_URL: http://minio:9000
      MINIO_PUBLIC_URL: https://punarmilan.com/api/photos
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      LOG_LEVEL_APP: INFO
    deploy:
      resources:
        limits:
          memory: 1024M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    image: worknai009/punarmilan-frontend:latest
    container_name: punarmilan-frontend
    restart: unless-stopped
    # No direct port exposure to outside in production (use gateway)
    depends_on:
      - backend

  nginx-gateway:
    image: nginx:alpine
    container_name: punarmilan-gateway
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/www/punarmilan/gateway.nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro # For SSL certificates on the host
    depends_on:
      - frontend
      - backend

volumes:
  mysql_data:
  minio_data:
