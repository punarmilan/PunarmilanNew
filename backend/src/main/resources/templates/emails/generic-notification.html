<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>PunarMilan Notification</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; color: #333; margin: 0; padding: 0; }
        .container { max-width: 600px; margin: 20px auto; border: 1px solid #eee; border-radius: 10px; overflow: hidden; }
        .header { background: linear-gradient(135deg, #e91e63, #9c27b0); color: white; padding: 20px; text-align: center; }
        .content { padding: 30px; }
        .footer { background: #f9f9f9; padding: 20px; text-align: center; font-size: 12px; color: #777; }
        .button { display: inline-block; padding: 12px 24px; background-color: #e91e63; color: white !important; text-decoration: none; border-radius: 5px; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>PunarMilan</h1>
        </div>
        <div class="content">
            <h2 th:text="${title}">Notification Title</h2>
            <p>Hello <span th:text="${recipientName}">User</span>,</p>
            <p th:text="${message}">Notification message goes here.</p>
            <p th:if="${senderName != null}">From: <strong th:text="${senderName}">Sender</strong></p>
            <a href="http://localhost:5173/my-shadi/dashboard" class="button">Visit PunarMilan</a>
        </div>
        <div class="footer">
            <p>&copy; 2026 PunarMilan Matrimonial Services. All rights reserved.</p>
            <p>You received this email because of your alert settings. <a href="http://localhost:5173/settings/alerts">Manage Settings</a></p>
        </div>
    </div>
</body>
</html>
